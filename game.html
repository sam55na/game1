<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Battle Tanks Elite - معركة الدبابات</title>
    
    <!-- ============================================================
    📚 المكتبات
    ============================================================ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js">
    </script>

    <style>
        /* ============================================================
        🎨 الأنماط الأساسية
        ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0f1a;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        /* ============================================================
        📱 تحذير الوضع الأفقي
        ============================================================ */
        .landscape-warning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            text-align: center;
            flex-direction: column;
            gap: 20px;
            color: #d4af37;
        }

        .landscape-warning .icon {
            font-size: 80px;
            animation: rotateWarning 1.5s ease-in-out infinite;
        }

        @keyframes rotateWarning {
            0%,
            100% {
                transform: rotate(0deg);
            }
            50% {
                transform: rotate(90deg);
            }
        }

        /* ============================================================
        🎮 HUD
        ============================================================ */
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            display: none;
        }

        /* شريط الحالة */
        .status-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-left: 4px solid #d4af37;
            border-radius: 16px;
            color: #e8e8e8;
            font-size: 14px;
            min-width: 140px;
            pointer-events: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .status-bar .row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            padding: 2px 0;
        }

        .status-bar .label {
            color: #8a9aa8;
            font-size: 12px;
        }

        .status-bar .value {
            font-weight: 700;
            color: #d4af37;
        }

        .status-bar .value.health {
            color: #2ecc71;
        }

        .status-bar .value.health.low {
            color: #e74c3c;
            animation: pulseHealth 0.5s ease-in-out infinite;
        }

        @keyframes pulseHealth {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        /* معلومات الفريق */
        .team-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 16px;
            color: #e8e8e8;
            font-size: 14px;
            text-align: right;
            pointer-events: none;
            min-width: 120px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .team-info .team {
            padding: 2px 0;
        }

        .team-info .team.team1 {
            color: #4caf50;
        }

        .team-info .team.team2 {
            color: #e74c3c;
        }

        /* التصويب */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            pointer-events: none;
            opacity: 0.8;
        }

        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 240, 0.9);
        }

        .crosshair::before {
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            transform: translateY(-50%);
        }

        .crosshair::after {
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            transform: translateX(-50%);
        }

        .crosshair .dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: #ff4444;
            border-radius: 50%;
        }

        .crosshair .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        /* عناصر التحكم */
        .controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
        }

        .joystick-base {
            width: 130px;
            height: 130px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(212, 175, 55, 0.4);
            border-radius: 50%;
            position: relative;
            pointer-events: auto;
            touch-action: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(212, 175, 55, 0.05);
            transition: border-color 0.3s ease;
        }

        .joystick-base:active {
            border-color: #d4af37;
        }

        .joystick-handle {
            width: 56px;
            height: 56px;
            background: radial-gradient(circle at 40% 35%, #f0d060, #b8860b);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3), inset 0 -4px 10px rgba(0, 0, 0, 0.3);
            transition: box-shadow 0.3s ease;
        }

        .joystick-base:active .joystick-handle {
            box-shadow: 0 4px 40px rgba(212, 175, 55, 0.5), inset 0 -4px 10px rgba(0, 0, 0, 0.3);
        }

        .fire-btn {
            width: 85px;
            height: 85px;
            background: radial-gradient(circle at 40% 35%, #ff6644, #cc2222);
            border: 3px solid rgba(212, 175, 55, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: white;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(255, 0, 0, 0.4), inset 0 -6px 20px rgba(0, 0, 0, 0.3);
            touch-action: none;
            transition: all 0.1s ease;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .fire-btn:active {
            transform: scale(0.92);
            box-shadow: 0 4px 20px rgba(255, 0, 0, 0.6), inset 0 0 30px rgba(255, 200, 100, 0.3);
        }

        .fire-btn .cooldown-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: 700;
            color: #d4af37;
        }

        .fire-btn .cooldown-overlay.show {
            display: flex;
        }

        /* زر ملء الشاشة */
        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 30px;
            padding: 8px 20px;
            color: #8a9aa8;
            cursor: pointer;
            font-size: 12px;
            pointer-events: auto;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', sans-serif;
        }

        .fullscreen-btn:hover {
            border-color: #d4af37;
            color: #d4af37;
        }

        /* ============================================================
        📊 شاشة التقرير
        ============================================================ */
        #reportScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .report-container {
            background: linear-gradient(145deg, #1a1a2e, #0a0a1a);
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            border: 2px solid rgba(212, 175, 55, 0.3);
            max-width: 450px;
            width: 92%;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
        }

        .report-container .icon {
            font-size: 72px;
            margin-bottom: 10px;
        }

        .report-container h2 {
            color: #d4af37;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .report-container .subtitle {
            color: #8a9aa8;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .report-container .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }

        .report-container .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 16px;
        }

        .report-container .stat-item .label {
            font-size: 12px;
            color: #8a9aa8;
        }

        .report-container .stat-item .value {
            font-size: 22px;
            font-weight: 700;
            color: #d4af37;
        }

        .report-container .stat-item .value.gold {
            color: #d4af37;
        }
        .report-container .stat-item .value.green {
            color: #2ecc71;
        }
        .report-container .stat-item .value.red {
            color: #e74c3c;
        }

        .report-btn {
            margin-top: 20px;
            padding: 14px 40px;
            background: linear-gradient(135deg, #d4af37, #b8860b);
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', sans-serif;
            color: #0a0f1a;
        }

        .report-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.3);
        }

        .report-btn:active {
            transform: scale(0.97);
        }

        /* ============================================================
        💀 رسالة الإقصاء
        ============================================================ */
        .elimination-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(10px);
            color: #ff4444;
            padding: 24px 48px;
            border-radius: 30px;
            font-size: 28px;
            font-weight: 900;
            z-index: 3000;
            border: 2px solid #ff4444;
            box-shadow: 0 30px 80px rgba(255, 0, 0, 0.2);
            text-align: center;
            animation: eliminateAnim 3s ease-in-out forwards;
            pointer-events: none;
        }

        .elimination-message .sub {
            font-size: 16px;
            font-weight: 400;
            color: #8a9aa8;
            margin-top: 8px;
        }

        @keyframes eliminateAnim {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.7);
            }
            15% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.05);
            }
            30% {
                transform: translate(-50%, -50%) scale(1);
            }
            85% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        /* ============================================================
        📱 التجاوب
        ============================================================ */
        @media (max-width: 768px) {
            .status-bar {
                top: 12px;
                left: 12px;
                padding: 8px 14px;
                font-size: 12px;
                min-width: 100px;
            }

            .team-info {
                top: 12px;
                right: 12px;
                padding: 8px 14px;
                font-size: 12px;
                min-width: 80px;
            }

            .joystick-base {
                width: 100px;
                height: 100px;
            }

            .joystick-handle {
                width: 44px;
                height: 44px;
            }

            .fire-btn {
                width: 65px;
                height: 65px;
                font-size: 30px;
            }

            .report-container {
                padding: 24px 20px;
            }

            .report-container .icon {
                font-size: 48px;
            }

            .report-container h2 {
                font-size: 22px;
            }

            .elimination-message {
                font-size: 20px;
                padding: 16px 24px;
            }
        }

        @media (max-width: 480px) {
            .status-bar {
                top: 8px;
                left: 8px;
                padding: 6px 10px;
                font-size: 10px;
                min-width: 80px;
                border-left-width: 2px;
            }

            .team-info {
                top: 8px;
                right: 8px;
                padding: 6px 10px;
                font-size: 10px;
                min-width: 60px;
            }

            .joystick-base {
                width: 80px;
                height: 80px;
            }

            .joystick-handle {
                width: 36px;
                height: 36px;
            }

            .fire-btn {
                width: 55px;
                height: 55px;
                font-size: 24px;
            }

            .controls {
                bottom: 16px;
                padding: 0 12px;
            }

            .crosshair {
                width: 28px;
                height: 28px;
            }

            .fullscreen-btn {
                display: none;
            }
        }

        /* ============================================================
        🌀 تحميل
        ============================================================ */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #0a0f1a, #05070c);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            gap: 30px;
        }

        #loading .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(212, 175, 55, 0.15);
            border-top: 4px solid #d4af37;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        #loading .text {
            color: #8a9aa8;
            font-size: 16px;
            letter-spacing: 2px;
        }

        #loading .progress {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        #loading .progress .bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #b8860b, #d4af37);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <!-- ============================================================
    🌀 شاشة التحميل
    ============================================================ -->
    <div id="loading">
        <div class="spinner"></div>
        <div class="text">⚔️ جاري تجهيز ساحة المعركة...</div>
        <div class="progress">
            <div class="bar" id="loadProgress"></div>
        </div>
    </div>

    <!-- ============================================================
    📱 تحذير الوضع الأفقي
    ============================================================ -->
    <div class="landscape-warning" id="landscapeWarning">
        <div class="icon">🔄</div>
        <h2>يرجى تدوير الجهاز</h2>
        <p style="color:#8a9aa8;">المعركة تعمل في الوضع الأفقي فقط</p>
    </div>

    <!-- ============================================================
    🎮 HUD
    ============================================================ -->
    <div id="hud">
        <!-- شريط الحالة -->
        <div class="status-bar">
            <div class="row">
                <span class="label">🎮</span>
                <span class="value" id="gameUsername">اللاعب</span>
            </div>
            <div class="row">
                <span class="label">💰</span>
                <span class="value" id="gameBalance">0$</span>
            </div>
            <div class="row">
                <span class="label">❤️</span>
                <span class="value health" id="healthDisplay">100%</span>
            </div>
            <div class="row" style="font-size:11px; color:#666; border-top:1px solid rgba(255,255,255,0.05); padding-top:4px; margin-top:4px;">
                <span>⚔️ <span id="killsDisplay">0</span></span>
                <span>💀 <span id="deathsDisplay">0</span></span>
            </div>
        </div>

        <!-- معلومات الفريق -->
        <div class="team-info">
            <div class="team team1">🟢 فريقي: <span id="myTeamCount">0</span></div>
            <div class="team team2">🔴 الخصم: <span id="enemyTeamCount">0</span></div>
            <div style="font-size:11px; color:#666; border-top:1px solid rgba(255,255,255,0.05); padding-top:4px; margin-top:4px;">
                🏆 <span id="teamScore">0 - 0</span>
            </div>
        </div>

        <!-- التصويب -->
        <div class="crosshair">
            <div class="dot"></div>
            <div class="ring"></div>
        </div>

        <!-- عناصر التحكم -->
        <div class="controls">
            <div class="joystick-base" id="joystickBase">
                <div class="joystick-handle" id="joystickHandle"></div>
            </div>
            <div class="fire-btn" id="fireBtn">
                💥
                <div class="cooldown-overlay" id="cooldownOverlay">3</div>
            </div>
        </div>

        <!-- زر ملء الشاشة -->
        <button class="fullscreen-btn" id="fullscreenBtn">🗔 ملء الشاشة</button>
    </div>

    <!-- ============================================================
    📊 شاشة التقرير
    ============================================================ -->
    <div id="reportScreen">
        <div class="report-container">
            <div class="icon" id="reportIcon">🏆</div>
            <h2 id="reportTitle">انتهت المعركة!</h2>
            <div class="subtitle" id="reportSubtitle">نتائج المعركة</div>

            <div class="stats-grid">
                <div class="stat-item">
                    <div class="label">🎯 الفريق</div>
                    <div class="value gold" id="reportTeam">-</div>
                </div>
                <div class="stat-item">
                    <div class="label">💰 المكافأة</div>
                    <div class="value green" id="reportReward">0$</div>
                </div>
                <div class="stat-item">
                    <div class="label">⚔️ قتل</div>
                    <div class="value" id="reportKills" style="color:#d4af37;">0</div>
                </div>
                <div class="stat-item">
                    <div class="label">💀 موت</div>
                    <div class="value red" id="reportDeaths">0</div>
                </div>
            </div>

            <button class="report-btn" id="reportBtn">🔄 معركة جديدة</button>
        </div>
    </div>

    <!-- ============================================================
    📜 JavaScript - محرك اللعبة الكامل
    ============================================================ -->
    <script>
        // ============================================================
        // 🔐 استخلاص معلومات المستخدم
        // ============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const TELEGRAM_ID = urlParams.get('user_id') || localStorage.getItem('telegramId');
        const USERNAME = localStorage.getItem('telegramUsername') || 'لاعب';

        if (!TELEGRAM_ID) {
            window.location.href = '/';
        }

        // ============================================================
        // 📡 اتصال Socket.io
        // ============================================================
        const socket = io({
            transports: ['websocket', 'polling'],
            reconnection: true,
            reconnectionAttempts: 10,
            reconnectionDelay: 1000,
        });

        // ============================================================
        // 🎮 حالة اللعبة
        // ============================================================
        const gameState = {
            userId: TELEGRAM_ID,
            username: USERNAME,
            team: 1,
            balance: 0,
            health: 100,
            maxHealth: 100,
            kills: 0,
            deaths: 0,
            isAlive: true,
            isEliminated: false,
            gameActive: false,
            lastShot: 0,
            cooldown: 3000,
            position: { x: 0, z: 0 },
            rotation: 0,
            token: localStorage.getItem('gameToken') || null,
        };

        // ============================================================
        // 🔐 المصادقة
        // ============================================================
        socket.on('connect', () => {
            console.log('🔌 Connected to server');
            if (gameState.token) {
                socket.emit('auth', { telegramId: TELEGRAM_ID, token: gameState.token });
            } else {
                socket.emit('auth', { telegramId: TELEGRAM_ID, username: USERNAME });
            }
        });

        socket.on('auth_success', (data) => {
            console.log('✅ Auth success:', data);
            gameState.balance = data.balance || 0;
            gameState.isAdmin = data.isAdmin || false;
            gameState.token = data.token;

            localStorage.setItem('gameToken', data.token);
            localStorage.setItem('telegramId', data.telegramId);

            document.getElementById('gameUsername').textContent = data.username || USERNAME;
            document.getElementById('gameBalance').textContent = data.balance + '$';
            document.getElementById('healthDisplay').textContent = '100%';

            // الانضمام إلى اللوبي
            socket.emit('join_lobby');
        });

        socket.on('auth_error', (data) => {
            console.error('❌ Auth error:', data);
            alert('خطأ في المصادقة: ' + data.message);
        });

        // ============================================================
        // 🏠 اللوبي
        // ============================================================
        socket.on('lobby_joined', (data) => {
            console.log('🏠 Lobby joined:', data);
            gameState.balance = data.balance || 0;
            document.getElementById('gameBalance').textContent = data.balance + '$';
            document.getElementById('loading').style.display = 'none';

            // إظهار HUD فقط عند بدء اللعبة
        });

        // ============================================================
        // 🎮 بدء اللعبة
        // ============================================================
        socket.on('game_start', (data) => {
            console.log('🎮 Game starting:', data);

            // إخفاء شاشة التحميل
            document.getElementById('loading').style.display = 'none';

            // إظهار HUD
            document.getElementById('hud').style.display = 'block';

            // تحديث حالة اللعبة
            gameState.gameActive = true;
            gameState.isEliminated = false;
            gameState.isAlive = true;
            gameState.health = 100;
            gameState.kills = 0;
            gameState.deaths = 0;
            gameState.team = data.yourTeam || 1;
            gameState.position = data.position || { x: 0, z: 0 };

            document.getElementById('healthDisplay').textContent = '100%';
            document.getElementById('healthDisplay').className = 'value health';
            document.getElementById('killsDisplay').textContent = '0';
            document.getElementById('deathsDisplay').textContent = '0';

            // تهيئة المشهد ثلاثي الأبعاد
            initScene(data);
        });

        // ============================================================
        // 🏆 نهاية اللعبة
        // ============================================================
        socket.on('game_ended', (data) => {
            console.log('🏆 Game ended:', data);

            gameState.gameActive = false;
            gameState.balance = data.yourBalance || gameState.balance;

            document.getElementById('gameBalance').textContent = gameState.balance + '$';
            document.getElementById('hud').style.display = 'none';

            showReport(data);
        });

        // ============================================================
        // 💀 الإقصاء
        // ============================================================
        socket.on('you_were_eliminated', (data) => {
            console.log('💀 You were eliminated!');

            gameState.isEliminated = true;
            gameState.isAlive = false;
            gameState.gameActive = false;

            showEliminationMessage('💀 لقد تم تدمير دبابتك!', data.killerName);

            setTimeout(() => {
                document.getElementById('hud').style.display = 'none';
                showReport({
                    winner: 'الخصم',
                    reward: 0,
                    yourBalance: gameState.balance,
                    kills: gameState.kills,
                    deaths: gameState.deaths + 1,
                });
            }, 3000);
        });

        // ============================================================
        // 🔄 تحديثات اللعبة
        // ============================================================
        socket.on('player_moved', (data) => {
            if (gameState.gameActive && data.userId !== TELEGRAM_ID) {
                updateOtherPlayer(data);
            }
        });

        socket.on('player_shot', (data) => {
            if (gameState.gameActive && data.userId !== TELEGRAM_ID) {
                createRemoteBullet(data);
            }
        });

        socket.on('health_update', (data) => {
            if (data.userId === TELEGRAM_ID) {
                gameState.health = data.health;
                document.getElementById('healthDisplay').textContent = data.health + '%';
                if (data.health < 30) {
                    document.getElementById('healthDisplay').className = 'value health low';
                } else {
                    document.getElementById('healthDisplay').className = 'value health';
                }
            }
            updateTankHealth(data.userId, data.health);
        });

        socket.on('player_eliminated', (data) => {
            if (gameState.gameActive) {
                if (data.userId === TELEGRAM_ID) {
                    gameState.isAlive = false;
                    gameState.isEliminated = true;
                }
                removeTank(data.userId);
                updateTeamCounts();
            }
        });

        socket.on('game_state_update', (data) => {
            if (gameState.gameActive && data.players) {
                data.players.forEach(player => {
                    if (player.userId !== TELEGRAM_ID) {
                        updateOtherPlayer({
                            userId: player.userId,
                            position: player.position,
                            rotation: player.rotation,
                            health: player.health,
                        });
                    }
                });
                updateTeamCounts();
            }
        });

        // ============================================================
        // 🎮 محرك Three.js - المشهد ثلاثي الأبعاد
        // ============================================================

        let scene, camera, renderer, composer;
        let playerTank = null;
        let playerTurret = null;
        let playerBarrel = null;
        const otherTanks = new Map();
        const otherTurrets = new Map();
        const bullets = [];
        const particles = [];
        const buildings = [];
        const debris = [];
        const trees = [];
        let clock = new THREE.Clock();

        // ============================================================
        // 🌍 تهيئة المشهد
        // ============================================================
        function initScene(data) {
            // ============================================================
            // 📷 الكاميرا والمشهد
            // ============================================================
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a2a3a);
            scene.fog = new THREE.FogExp2(0x1a2a3a, 0.0012);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 600);

            const canvas = document.createElement('canvas');
            canvas.id = 'gameCanvas';
            document.body.prepend(canvas);

            renderer = new THREE.WebGLRenderer({
                canvas: canvas,
                antialias: true,
                powerPreference: 'high-performance',
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            renderer.outputEncoding = THREE.sRGBEncoding;

            // ============================================================
            // ✨ التأثيرات اللاحقة (Bloom, SSAO)
            // ============================================================
            const renderPass = new THREE.RenderPass(scene, camera);

            const bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                0.15, // قوة Bloom
                0.5, // نصف القطر
                0.2 // العتبة
            );

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderPass);
            composer.addPass(bloomPass);

            // ============================================================
            // 💡 الإضاءة
            // ============================================================
            // ضوء محيطي
            const ambient = new THREE.AmbientLight(0x404060, 0.4);
            scene.add(ambient);

            // ضوء الشمس الرئيسي
            const sun = new THREE.DirectionalLight(0xffeedd, 1.8);
            sun.position.set(80, 100, 60);
            sun.castShadow = true;
            sun.shadow.mapSize.set(2048, 2048);
            sun.shadow.camera.near = 0.5;
            sun.shadow.camera.far = 300;
            sun.shadow.camera.left = -150;
            sun.shadow.camera.right = 150;
            sun.shadow.camera.top = 150;
            sun.shadow.camera.bottom = -150;
            sun.shadow.bias = -0.001;
            scene.add(sun);

            // ضوء ثانوي للتفاصيل
            const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
            fill.position.set(-60, 40, -80);
            scene.add(fill);

            // ضوء خلفي دافئ
            const rim = new THREE.DirectionalLight(0xff8844, 0.2);
            rim.position.set(-40, 20, 100);
            scene.add(rim);

            // ============================================================
            // 🌍 إنشاء المدينة المهجورة
            // ============================================================
            createCity();

            // ============================================================
            // 🎨 إنشاء الدبابات
            // ============================================================
            const players = data.players || [];
            gameState.team = data.yourTeam || 1;

            // دبابة اللاعب
            const myPos = data.position || { x: -120, z: -80 };
            const myColor = gameState.team === 1 ? 0x4a6a3a : 0x6a4a3a;
            playerTank = createTank(myColor, myPos.x, myPos.z, gameState.team, TELEGRAM_ID, true);
            playerTank.userData.isPlayer = true;
            scene.add(playerTank);

            // تخزين المراجع للبرج والمدفع
            playerTurret = playerTank.getObjectByName('turret');
            playerBarrel = playerTank.getObjectByName('barrel');

            // دبابات اللاعبين الآخرين
            for (const p of players) {
                if (p.userId !== TELEGRAM_ID) {
                    const pos = p.position || { x: 120, z: 80 };
                    const color = p.team === 1 ? 0x4a6a3a : 0x6a4a3a;
                    const tank = createTank(color, pos.x, pos.z, p.team, p.userId, false);
                    scene.add(tank);
                    otherTanks.set(p.userId, tank);
                }
            }

            // ============================================================
            // 🎵 الصوت
            // ============================================================
            initAudio();

            // ============================================================
            // 🎮 عناصر التحكم
            // ============================================================
            setupControls();

            // ============================================================
            // 📐 تغيير حجم النافذة
            // ============================================================
            window.addEventListener('resize', onResize);

            // ============================================================
            // 🔄 بدء الحلقة
            // ============================================================
            animate();

            // تحديث أعداد الفرق
            updateTeamCounts();

            // إخفاء شاشة التحميل
            document.getElementById('loading').style.display = 'none';
        }

        // ============================================================
        // 🏙️ إنشاء المدينة المهجورة
        // ============================================================
        function createCity() {
            // ============================================================
            // 🌍 الأرضية
            // ============================================================
            const groundCanvas = document.createElement('canvas');
            groundCanvas.width = 1024;
            groundCanvas.height = 1024;
            const ctx = groundCanvas.getContext('2d');

            // لون أساسي للتربة
            ctx.fillStyle = '#3d4a2a';
            ctx.fillRect(0, 0, 1024, 1024);

            // نسيج عشبي متفرق
            for (let i = 0; i < 5000; i++) {
                const x = Math.random() * 1024;
                const y = Math.random() * 1024;
                const shade = 60 + Math.random() * 60;
                ctx.fillStyle = `rgb(${shade}, ${shade + 30}, ${shade - 20})`;
                ctx.fillRect(x, y, 2 + Math.random() * 4, 2 + Math.random() * 4);
            }

            // بقع صحراوية
            for (let i = 0; i < 200; i++) {
                const x = Math.random() * 1024;
                const y = Math.random() * 1024;
                const r = 20 + Math.random() * 80;
                const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
                grad.addColorStop(0, 'rgba(180, 160, 100, 0.15)');
                grad.addColorStop(1, 'rgba(180, 160, 100, 0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }

            const groundTexture = new THREE.CanvasTexture(groundCanvas);
            groundTexture.wrapS = THREE.RepeatWrapping;
            groundTexture.wrapT = THREE.RepeatWrapping;
            groundTexture.repeat.set(40, 40);

            const groundMat = new THREE.MeshStandardMaterial({
                map: groundTexture,
                roughness: 0.95,
                metalness: 0,
                envMapIntensity: 0.2,
            });

            const groundGeo = new THREE.PlaneGeometry(800, 800, 120, 120);
            groundGeo.rotateX(-Math.PI / 2);
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.receiveShadow = true;
            ground.position.y = -0.5;
            scene.add(ground);

            // ============================================================
            // 🏢 المباني
            // ============================================================
            const buildingMaterials = [
                { color: 0x8a7a5a, roughness: 0.9, metalness: 0.1 },
                { color: 0x7a6a4a, roughness: 0.85, metalness: 0.1 },
                { color: 0x9a8a6a, roughness: 0.9, metalness: 0.05 },
                { color: 0x6a5a3a, roughness: 0.95, metalness: 0.05 },
                { color: 0x5a4a3a, roughness: 0.9, metalness: 0.1 },
            ];

            const windowMat = new THREE.MeshStandardMaterial({
                color: 0x224466,
                roughness: 0.3,
                metalness: 0.7,
                emissive: 0x112233,
                emissiveIntensity: 0.1,
            });

            const buildingPositions = [];

            // مباني سكنية
            for (let i = 0; i < 80; i++) {
                const x = (Math.random() - 0.5) * 500;
                const z = (Math.random() - 0.5) * 500;

                // تجنب وضع المباني فوق بعضها
                let overlap = false;
                for (const pos of buildingPositions) {
                    if (Math.sqrt((x - pos.x) ** 2 + (z - pos.z) ** 2) < 15) {
                        overlap = true;
                        break;
                    }
                }
                if (overlap) continue;

                buildingPositions.push({ x, z });

                const w = 6 + Math.random() * 12;
                const d = 6 + Math.random() * 12;
                const h = 4 + Math.random() * 20;

                const mat = buildingMaterials[Math.floor(Math.random() * buildingMaterials.length)];
                const material = new THREE.MeshStandardMaterial(mat);

                const building = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
                building.position.set(x, h / 2 - 0.5, z);
                building.castShadow = true;
                building.receiveShadow = true;
                scene.add(building);
                buildings.push(building);

                // نوافذ
                if (h > 6) {
                    const windowCount = Math.floor(Math.random() * 8) + 4;
                    for (let j = 0; j < windowCount; j++) {
                        const wx = (Math.random() - 0.5) * w * 0.7;
                        const wz = (Math.random() - 0.5) * d * 0.7;
                        const wy = (Math.random() - 0.5) * h * 0.6 + h * 0.3;

                        const windowMesh = new THREE.Mesh(
                            new THREE.PlaneGeometry(0.8, 1.2),
                            windowMat
                        );

                        // تحديد الجانب
                        const side = Math.floor(Math.random() * 4);
                        if (side === 0) {
                            windowMesh.position.set(wx, wy, d / 2 + 0.01);
                        } else if (side === 1) {
                            windowMesh.position.set(wx, wy, -d / 2 - 0.01);
                            windowMesh.rotation.y = Math.PI;
                        } else if (side === 2) {
                            windowMesh.position.set(w / 2 + 0.01, wy, wz);
                            windowMesh.rotation.y = Math.PI / 2;
                        } else {
                            windowMesh.position.set(-w / 2 - 0.01, wy, wz);
                            windowMesh.rotation.y = -Math.PI / 2;
                        }
                        building.add(windowMesh);
                    }
                }

                // سطح متضرر
                if (Math.random() > 0.5) {
                    const roofMat = new THREE.MeshStandardMaterial({
                        color: 0x5a4a3a,
                        roughness: 0.9,
                    });
                    const roof = new THREE.Mesh(
                        new THREE.BoxGeometry(w * 0.3, 0.3, d * 0.3),
                        roofMat
                    );
                    roof.position.set(
                        (Math.random() - 0.5) * w * 0.3,
                        h / 2 + 0.2,
                        (Math.random() - 0.5) * d * 0.3
                    );
                    roof.rotation.x = (Math.random() - 0.5) * 0.2;
                    roof.rotation.z = (Math.random() - 0.5) * 0.2;
                    building.add(roof);
                }
            }

            // ============================================================
            // 🏗️ أنقاض وحطام
            // ============================================================
            const debrisMat = new THREE.MeshStandardMaterial({
                color: 0x6a5a4a,
                roughness: 0.95,
                metalness: 0.05,
            });

            for (let i = 0; i < 150; i++) {
                const x = (Math.random() - 0.5) * 500;
                const z = (Math.random() - 0.5) * 500;

                // تجنب وضع الحطام في منتصف الطرق
                if (Math.abs(x) < 30 && Math.abs(z) < 30) continue;

                const size = 0.5 + Math.random() * 2;
                const type = Math.random();

                let mesh;
                if (type < 0.3) {
                    mesh = new THREE.Mesh(new THREE.BoxGeometry(size, size * 0.3, size * 0.7), debrisMat);
                } else if (type < 0.6) {
                    mesh = new THREE.Mesh(new THREE.DodecahedronGeometry(size * 0.5), debrisMat);
                } else {
                    mesh = new THREE.Mesh(new THREE.CylinderGeometry(size * 0.4, size * 0.6, size * 0.5, 5), debrisMat);
                }

                mesh.position.set(x, size * 0.15, z);
                mesh.rotation.set(
                    (Math.random() - 0.5) * 2,
                    Math.random() * Math.PI * 2,
                    (Math.random() - 0.5) * 2
                );
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);
                debris.push(mesh);
            }

            // ============================================================
            // 🌳 أشجار ميتة
            // ============================================================
            const trunkMat = new THREE.MeshStandardMaterial({
                color: 0x3a2a1a,
                roughness: 0.95,
                metalness: 0,
            });

            const branchMat = new THREE.MeshStandardMaterial({
                color: 0x2a1a0a,
                roughness: 0.95,
                metalness: 0,
            });

            for (let i = 0; i < 60; i++) {
                const x = (Math.random() - 0.5) * 480;
                const z = (Math.random() - 0.5) * 480;

                // تجنب وضع الأشجار في وسط المدينة
                if (Math.abs(x) < 80 && Math.abs(z) < 80) continue;

                const tree = new THREE.Group();
                const height = 3 + Math.random() * 6;

                // الجذع
                const trunk = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.2 + Math.random() * 0.3, 0.4 + Math.random() * 0.4, height, 6),
                    trunkMat
                );
                trunk.position.y = height / 2;
                trunk.castShadow = true;
                trunk.receiveShadow = true;
                tree.add(trunk);

                // الفروع (أشجار ميتة بدون أوراق)
                const branchCount = 3 + Math.floor(Math.random() * 5);
                for (let j = 0; j < branchCount; j++) {
                    const bHeight = 0.8 + Math.random() * 1.5;
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 0.5 + Math.random() * 0.8;

                    const branch = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.05, 0.12, bHeight, 4),
                        branchMat
                    );
                    branch.position.set(
                        Math.cos(angle) * radius,
                        height * (0.3 + Math.random() * 0.4),
                        Math.sin(angle) * radius
                    );
                    branch.rotation.z = (Math.random() - 0.5) * 1.2;
                    branch.rotation.x = (Math.random() - 0.5) * 1.2;
                    branch.castShadow = true;
                    branch.receiveShadow = true;
                    tree.add(branch);
                }

                tree.position.set(x, -0.5, z);
                tree.rotation.y = Math.random() * Math.PI * 2;
                scene.add(tree);
                trees.push(tree);
            }

            // ============================================================
            // 🌫️ غبار وجسيمات
            // ============================================================
            const dustTexture = createDustTexture();
            const dustMat = new THREE.PointsMaterial({
                map: dustTexture,
                size: 0.5,
                transparent: true,
                opacity: 0.15,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });

            const dustGeo = new THREE.BufferGeometry();
            const dustCount = 3000;
            const dustPositions = new Float32Array(dustCount * 3);
            for (let i = 0; i < dustCount * 3; i++) {
                dustPositions[i] = (Math.random() - 0.5) * 600;
                dustPositions[i] += i % 3 === 1 ? 10 : 0; // ارتفاع
            }
            dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));

            const dustParticles = new THREE.Points(dustGeo, dustMat);
            dustParticles.position.y = 5;
            scene.add(dustParticles);

            // ============================================================
            // 🚧 جدران دفاعية
            // ============================================================
            const wallMat = new THREE.MeshStandardMaterial({
                color: 0x5a4a3a,
                roughness: 0.9,
                metalness: 0.1,
            });

            // جدار الفريق 1 (أخضر)
            for (let i = -4; i <= 4; i++) {
                const wall = new THREE.Mesh(
                    new THREE.BoxGeometry(8, 4, 2),
                    wallMat
                );
                wall.position.set(-95 + i * 8, 2, -75);
                wall.castShadow = true;
                wall.receiveShadow = true;
                scene.add(wall);
                buildings.push(wall);
            }

            // جدار الفريق 2 (أحمر)
            for (let i = -4; i <= 4; i++) {
                const wall = new THREE.Mesh(
                    new THREE.BoxGeometry(8, 4, 2),
                    wallMat
                );
                wall.position.set(95 + i * 8, 2, 75);
                wall.castShadow = true;
                wall.receiveShadow = true;
                scene.add(wall);
                buildings.push(wall);
            }

            // ============================================================
            // 🗺️ علامات أرضية
            // ============================================================
            const markerMat = new THREE.MeshStandardMaterial({
                color: 0x8a7a5a,
                roughness: 0.9,
                transparent: true,
                opacity: 0.3,
            });

            // دوائر متحدة المركز في وسط الساحة
            for (let r = 10; r <= 60; r += 10) {
                const ring = new THREE.Mesh(
                    new THREE.RingGeometry(r - 0.5, r + 0.5, 64),
                    markerMat
                );
                ring.rotation.x = -Math.PI / 2;
                ring.position.y = -0.45;
                scene.add(ring);
            }
        }

        // ============================================================
        // 🎨 إنشاء نسيج الغبار
        // ============================================================
        function createDustTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');

            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.3, 'rgba(255,255,255,0.6)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);

            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        // ============================================================
        // 🎨 إنشاء نسيج تمويه الدبابة
        // ============================================================
        function createCamoTexture(colors) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            // لون الأساس
            ctx.fillStyle = colors.base;
            ctx.fillRect(0, 0, 256, 256);

            // بقع التمويه
            for (let i = 0; i < 30; i++) {
                ctx.fillStyle = colors.spot1;
                ctx.beginPath();
                ctx.arc(
                    Math.random() * 256,
                    Math.random() * 256,
                    20 + Math.random() * 40,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
            }

            for (let i = 0; i < 20; i++) {
                ctx.fillStyle = colors.spot2;
                ctx.beginPath();
                ctx.arc(
                    Math.random() * 256,
                    Math.random() * 256,
                    10 + Math.random() * 25,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
            }

            // خطوط عشوائية
            for (let i = 0; i < 20; i++) {
                ctx.strokeStyle = colors.spot2;
                ctx.lineWidth = 2 + Math.random() * 4;
                ctx.beginPath();
                ctx.moveTo(Math.random() * 256, Math.random() * 256);
                ctx.lineTo(Math.random() * 256, Math.random() * 256);
                ctx.stroke();
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(2, 2);
            return texture;
        }

        // ============================================================
        // 🎨 إنشاء دبابة متقدمة
        // ============================================================
        function createTank(color, x, z, team, userId, isPlayer) {
            const group = new THREE.Group();
            group.userData = {
                userId: userId,
