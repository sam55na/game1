        // ============================================================
        // 🎵 نظام الصوت المتقدم
        // ============================================================
        let audioCtx = null;
        let engineOsc = null;
        let engineGain = null;
        let engineFilter = null;
        let engineRunning = false;

        function initAudio() {
            try {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();

                // محرك الدبابة
                engineOsc = audioCtx.createOscillator();
                engineGain = audioCtx.createGain();
                engineFilter = audioCtx.createBiquadFilter();

                engineOsc.type = 'sawtooth';
                engineOsc.frequency.value = 30;

                engineFilter.type = 'lowpass';
                engineFilter.frequency.value = 150;
                engineFilter.Q.value = 0.5;

                engineGain.gain.value = 0;

                engineOsc.connect(engineFilter);
                engineFilter.connect(engineGain);
                engineGain.connect(audioCtx.destination);

                engineOsc.start();
                engineRunning = true;

                console.log('🎵 Audio engine initialized');

            } catch (error) {
                console.warn('⚠️ Audio initialization failed:', error);
            }
        }

        function updateEngineSound(speed) {
            if (!engineRunning || !engineOsc) return;

            const freq = 30 + Math.abs(speed) * 60;
            const gain = Math.min(0.15, Math.abs(speed) * 0.08);

            engineOsc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);
            engineGain.gain.setTargetAtTime(gain, audioCtx.currentTime, 0.05);
        }

        function playShotSound() {
            if (!audioCtx) return;

            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                osc.type = 'square';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.2);

                filter.type = 'lowpass';
                filter.frequency.value = 300;
                filter.Q.value = 0.7;

                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.25);

            } catch (error) {
                console.warn('⚠️ Shot sound error:', error);
            }
        }

        function playExplosionSound(distance) {
            if (!audioCtx) return;

            try {
                const vol = Math.max(0.05, Math.min(0.8, 1 - distance / 60));

                // ضوضاء الانفجار
                const bufferSize = audioCtx.sampleRate * 0.8;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);

                for (let i = 0; i < bufferSize; i++) {
                    const env = Math.exp(-i / bufferSize * 3);
                    data[i] = (Math.random() * 2 - 1) * env;
                }

                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 800;
                filter.Q.value = 0.5;

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                noise.start(audioCtx.currentTime);

                // رنين منخفض التردد
                const osc = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(50, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.5);

                gain2.gain.setValueAtTime(vol * 0.3, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

                osc.connect(gain2);
                gain2.connect(audioCtx.destination);

                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.5);

            } catch (error) {
                console.warn('⚠️ Explosion sound error:', error);
            }
        }

        // ============================================================
        // 🎮 عناصر التحكم
        // ============================================================
        let joystick = { x: 0, y: 0 };
        let isJoystickActive = false;
        let lastMoveTime = 0;

        function setupControls() {
            // ============================================================
            // عصا التحكم (لمس)
            // ============================================================
            const base = document.getElementById('joystickBase');
            const handle = document.getElementById('joystickHandle');

            const moveJoystick = (e) => {
                if (!isJoystickActive) return;

                const rect = base.getBoundingClientRect();
                const touch = e.touches ? e.touches[0] : e;

                let dx = touch.clientX - (rect.left + rect.width / 2);
                let dy = touch.clientY - (rect.top + rect.height / 2);

                const maxDist = rect.width / 2 - 10;
                const dist = Math.min(Math.sqrt(dx * dx + dy * dy), maxDist);

                if (dist > 0) {
                    const angle = Math.atan2(dy, dx);
                    dx = Math.cos(angle) * dist;
                    dy = Math.sin(angle) * dist;
                }

                handle.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

                joystick.x = dx / maxDist;
                joystick.y = dy / maxDist;

                // تحديث سرعة الدبابة
                updateTankMovement();
            };

            const endJoystick = () => {
                isJoystickActive = false;
                handle.style.transform = 'translate(-50%, -50%)';
                joystick = { x: 0, y: 0 };
                updateTankMovement();
            };

            base.addEventListener('touchstart', (e) => {
                e.preventDefault();
                isJoystickActive = true;
                moveJoystick(e);
            });

            base.addEventListener('mousedown', () => {
                isJoystickActive = true;
            });

            document.addEventListener('touchmove', moveJoystick);
            document.addEventListener('mousemove', moveJoystick);

            document.addEventListener('touchend', endJoystick);
            document.addEventListener('mouseup', endJoystick);

            // ============================================================
            // زر الإطلاق
            // ============================================================
            const fireBtn = document.getElementById('fireBtn');
            const cooldownOverlay = document.getElementById('cooldownOverlay');

            const fire = () => {
                if (gameState.isEliminated || !gameState.gameActive || !playerTank) return;

                const now = Date.now();
                if (now - gameState.lastShot < gameState.cooldown) return;

                gameState.lastShot = now;

                // إطلاق رصاصة
                fireBullet();

                // عرض التباطؤ
                cooldownOverlay.classList.add('show');
                let count = Math.ceil(gameState.cooldown / 1000);
                cooldownOverlay.textContent = count;

                const interval = setInterval(() => {
                    count--;
                    if (count <= 0) {
                        clearInterval(interval);
                        cooldownOverlay.classList.remove('show');
                    } else {
                        cooldownOverlay.textContent = count;
                    }
                }, 1000);
            };

            fireBtn.addEventListener('click', fire);
            fireBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                fire();
            });

            // ============================================================
            // لوحة المفاتيح
            // ============================================================
            const keys = {};

            document.addEventListener('keydown', (e) => {
                keys[e.key] = true;

                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    fire();
                }
            });

            document.addEventListener('keyup', (e) => {
                keys[e.key] = false;
            });

            // تحديث حركة لوحة المفاتيح
            setInterval(() => {
                if (!gameState.gameActive || gameState.isEliminated) return;

                let dx = 0,
                    dy = 0;
                if (keys['w'] || keys['W'] || keys['ArrowUp']) dy = -1;
                if (keys['s'] || keys['S'] || keys['ArrowDown']) dy = 1;
                if (keys['a'] || keys['A'] || keys['ArrowLeft']) dx = -1;
                if (keys['d'] || keys['D'] || keys['ArrowRight']) dx = 1;

                if (dx !== 0 || dy !== 0) {
                    const len = Math.sqrt(dx * dx + dy * dy);
                    joystick.x = dx / len * 0.8;
                    joystick.y = dy / len * 0.8;
                    updateTankMovement();
                }
            }, 50);

            // ============================================================
            // ملء الشاشة
            // ============================================================
            document.getElementById('fullscreenBtn').addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => {});
                } else {
                    document.exitFullscreen().catch(() => {});
                }
            });

            // ============================================================
            // التحقق من الوضع الأفقي
            // ============================================================
            const checkOrientation = () => {
                const warning = document.getElementById('landscapeWarning');
                if (window.innerHeight > window.innerWidth) {
                    warning.style.display = 'flex';
                } else {
                    warning.style.display = 'none';
                }
            };

            window.addEventListener('resize', checkOrientation);
            checkOrientation();
        }

        // ============================================================
        // 🎯 تحديث حركة الدبابة
        // ============================================================
        function updateTankMovement() {
            if (!playerTank || gameState.isEliminated) return;

            const speed = -joystick.y * 0.25;
            const rot = -joystick.x * 0.04;

            // تحديث سرعة المحرك الصوتي
            updateEngineSound(Math.abs(speed));

            // تطبيق الدوران والحركة
            playerTank.rotation.y += rot;

            // حساب الموقع الجديد
            const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(playerTank.quaternion);
            const newX = playerTank.position.x + forward.x * speed;
            const newZ = playerTank.position.z + forward.z * speed;

            // التحقق من التصادم مع المباني
            if (!checkCollision(newX, newZ)) {
                playerTank.position.x = newX;
                playerTank.position.z = newZ;

                // تحديث برج المدفع ليتجه مع الحركة
                const turret = playerTank.getObjectByName('turret');
                if (turret) {
                    // البرج يتبع حركة الدبابة بشكل طبيعي
                }
            }

            // تحديث الموقع في الخادم (بمعدل محدود)
            const now = Date.now();
            if (now - lastMoveTime > 50) {
                lastMoveTime = now;
                socket.emit('move', {
                    position: {
                        x: playerTank.position.x,
                        z: playerTank.position.z,
                    },
                    rotation: playerTank.rotation.y,
                });
            }

            // تحديث الكاميرا
            updateCamera();
        }

        // ============================================================
        // 📷 تحديث الكاميرا
        // ============================================================
        let cameraShake = 0;

        function updateCamera() {
            if (!playerTank) return;

            const offset = new THREE.Vector3(0, 8, -14).applyQuaternion(playerTank.quaternion);
            const targetPos = playerTank.position.clone().add(offset);

            // اهتزاز الكاميرا
            if (cameraShake > 0) {
                targetPos.x += (Math.random() - 0.5) * cameraShake * 0.5;
                targetPos.y += (Math.random() - 0.5) * cameraShake * 0.3;
                cameraShake *= 0.92;
            }

            camera.position.lerp(targetPos, 0.08);
            camera.lookAt(playerTank.position.clone().add(new THREE.Vector3(0, 1.5, 0)));
        }

        // ============================================================
        // 💥 التصادم
        // ============================================================
        function checkCollision(x, z) {
            // حدود الساحة
            if (Math.abs(x) > 380 || Math.abs(z) > 380) return true;

            // التصادم مع المباني
            const tankRadius = 3.5;
            for (const building of buildings) {
                const bbox = new THREE.Box3().setFromObject(building);
                const half = bbox.getSize(new THREE.Vector3()).multiplyScalar(0.5);

                const dx = Math.abs(x - building.position.x);
                const dz = Math.abs(z - building.position.z);

                if (dx < half.x + tankRadius && dz < half.z + tankRadius) {
                    return true;
                }
            }

            return false;
        }

        // ============================================================
        // 💥 إطلاق الرصاصة
        // ============================================================
        function fireBullet() {
            if (!playerTank) return;

            // تحديد اتجاه الرصاصة من المدفع
            const turret = playerTank.getObjectByName('turret');
            const barrel = playerTank.getObjectByName('barrel');

            let direction = new THREE.Vector3(0, 0, 1);

            if (turret && barrel) {
                // اتجاه البرج + المدفع
                const turretQuat = new THREE.Quaternion().setFromUnitVectors(
                    new THREE.Vector3(0, 0, 1),
                    new THREE.Vector3(0, 0, 1).applyQuaternion(turret.quaternion)
                );
                direction.applyQuaternion(turretQuat);
                direction.applyQuaternion(playerTank.quaternion);
            } else {
                direction.applyQuaternion(playerTank.quaternion);
            }

            direction.normalize();

            // موقع الرصاصة (فوهة المدفع)
            let startPos = playerTank.position.clone();
            startPos.y += 1.8;

            if (barrel) {
                const barrelEnd = new THREE.Vector3(0, 0, 5.2);
                barrelEnd.applyQuaternion(barrel.quaternion);
                barrelEnd.applyQuaternion(turret ? turret.quaternion : new THREE.Quaternion());
                barrelEnd.applyQuaternion(playerTank.quaternion);
                startPos.add(barrelEnd);
            } else {
                startPos.add(direction.clone().multiplyScalar(5));
            }

            // إنشاء الرصاصة
            const bulletMat = new THREE.MeshStandardMaterial({
                color: 0xff8844,
                emissive: 0xff4422,
                emissiveIntensity: 0.8,
                roughness: 0.3,
                metalness: 0.7,
            });

            const bullet = new THREE.Mesh(
                new THREE.SphereGeometry(0.3, 12, 12),
                bulletMat
            );
            bullet.position.copy(startPos);
            bullet.userData = {
                velocity: direction.clone().multiplyScalar(2.8),
                life: 150,
                ownerId: TELEGRAM_ID,
                bulletId: Date.now() + Math.random(),
                trail: [],
            };
            bullet.castShadow = true;

            // تأثير ضوء حول الرصاصة
            const light = new THREE.PointLight(0xff4422, 1, 5);
            bullet.add(light);

            scene.add(bullet);
            bullets.push(bullet);

            // صوت الإطلاق
            playShotSound();

            // اهتزاز الكاميرا
            cameraShake = 0.3;

            // إرسال إلى الخادم
            socket.emit('shoot', {
                position: {
                    x: startPos.x,
                    y: startPos.y,
                    z: startPos.z,
                },
                direction: {
                    x: direction.x,
                    y: direction.y,
                    z: direction.z,
                },
                bulletId: bullet.userData.bulletId,
            });
        }

        // ============================================================
        // 🌐 رصاصة عن بعد
        // ============================================================
        function createRemoteBullet(data) {
            const direction = new THREE.Vector3(data.direction.x, data.direction.y, data.direction.z);

            const bulletMat = new THREE.MeshStandardMaterial({
                color: 0xff8844,
                emissive: 0xff4422,
                emissiveIntensity: 0.6,
                roughness: 0.3,
                metalness: 0.7,
            });

            const bullet = new THREE.Mesh(
                new THREE.SphereGeometry(0.3, 12, 12),
                bulletMat
            );
            bullet.position.set(data.position.x, data.position.y, data.position.z);
            bullet.userData = {
                velocity: direction.clone().multiplyScalar(2.8),
                life: 150,
                ownerId: data.userId,
                bulletId: data.bulletId,
                isRemote: true,
            };
            bullet.castShadow = true;

            scene.add(bullet);
            bullets.push(bullet);
        }

        // ============================================================
        // 💥 انفجار
        // ============================================================
        function createExplosion(position, size = 1.5) {
            // ============================================================
            // جسيمات الانفجار
            // ============================================================
            const particleCount = 60 + Math.floor(Math.random() * 40);
            const colors = [0xff8844, 0xff4422, 0xffaa66, 0xffcc88, 0xcc4422];

            for (let i = 0; i < particleCount; i++) {
                const color = colors[Math.floor(Math.random() * colors.length)];
                const mat = new THREE.MeshStandardMaterial({
                    color: color,
                    emissive: 0xff4422,
                    emissiveIntensity: 0.5,
                    roughness: 0.5,
                });

                const size_p = 0.1 + Math.random() * 0.4;
                const particle = new THREE.Mesh(
                    new THREE.SphereGeometry(size_p, 6, 6),
                    mat
                );
                particle.position.copy(position);
                particle.position.y += Math.random() * 0.5;

                const speed = 1 + Math.random() * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;

                particle.userData = {
                    vel: new THREE.Vector3(
                        Math.sin(theta) * Math.cos(phi) * speed,
                        Math.sin(phi) * speed * 0.5 + 1,
                        Math.cos(theta) * Math.cos(phi) * speed
                    ),
                    life: 0.6 + Math.random() * 0.6,
                    gravity: 0.05 + Math.random() * 0.05,
                };

                scene.add(particle);
                particles.push(particle);
            }

            // ============================================================
            // جسيمات الدخان
            // ============================================================
            const smokeMat = new THREE.MeshStandardMaterial({
                color: 0x886666,
                emissive: 0x442222,
                emissiveIntensity: 0.2,
                transparent: true,
                opacity: 0.6,
                roughness: 0.9,
            });

            for (let i = 0; i < 15; i++) {
                const smoke = new THREE.Mesh(
                    new THREE.SphereGeometry(0.2 + Math.random() * 0.6, 8, 8),
                    smokeMat
                );
                smoke.position.copy(position);
                smoke.position.y += Math.random() * 0.5;

                const speed = 0.3 + Math.random() * 0.6;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI * 0.5;

                smoke.userData = {
                    vel: new THREE.Vector3(
                        Math.sin(theta) * Math.cos(phi) * speed,
                        Math.sin(phi) * speed * 0.3 + 0.3,
                        Math.cos(theta) * Math.cos(phi) * speed
                    ),
                    life: 1.2 + Math.random() * 0.8,
                    scale: 1,
                };

                scene.add(smoke);
                particles.push(smoke);
            }

            // ============================================================
            // وميض الضوء
            // ============================================================
            const flash = new THREE.Mesh(
                new THREE.SphereGeometry(size * 0.5, 12, 12),
                new THREE.MeshBasicMaterial({
                    color: 0xffaa66,
                    transparent: true,
                    opacity: 0.8,
                })
            );
            flash.position.copy(position);
            scene.add(flash);

            setTimeout(() => {
                scene.remove(flash);
            }, 200);

            // ============================================================
            // ضوء الانفجار
            // ============================================================
            const explosionLight = new THREE.PointLight(0xff4422, 3, 20);
            explosionLight.position.copy(position);
            scene.add(explosionLight);

            setTimeout(() => {
                scene.remove(explosionLight);
            }, 500);

            // ============================================================
            // صوت الانفجار
            // ============================================================
            const dist = playerTank ? position.distanceTo(playerTank.position) : 30;
            playExplosionSound(dist);

            // اهتزاز الكاميرا
            if (dist < 30) {
                cameraShake = Math.min(1.5, 1.5 - dist / 30);
            }
        }

        // ============================================================
        // 🗑️ تحديث الجسيمات
        // ============================================================
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.userData.life -= 0.016;

                if (p.userData.life <= 0) {
                    scene.remove(p);
                    particles.splice(i, 1);
                } else {
                    p.position.x += p.userData.vel.x * 0.016;
                    p.position.z += p.userData.vel.z * 0.016;
                    p.position.y += p.userData.vel.y * 0.016;

                    if (p.userData.gravity) {
                        p.userData.vel.y -= p.userData.gravity * 0.016;
                    }

                    if (p.userData.scale) {
                        p.userData.scale += 0.02;
                        p.scale.setScalar(p.userData.scale);
                        p.material.opacity = p.userData.life * 0.6;
                    }

                    if (p.material.emissiveIntensity !== undefined) {
                        p.material.emissiveIntensity = p.userData.life * 1.5;
                    }

                    const scale = p.userData.life * 1.5;
                    p.scale.setScalar(Math.max(0.1, scale));
                }
            }
        }

        // ============================================================
        // 🔄 تحديث اللاعبين الآخرين
        // ============================================================
        function updateOtherPlayer(data) {
            const tank = otherTanks.get(data.userId);
            if (tank) {
                // تنعيم الحركة
                tank.position.x += (data.position.x - tank.position.x) * 0.25;
                tank.position.z += (data.position.z - tank.position.z) * 0.25;

                if (data.rotation !== undefined) {
                    let diff = data.rotation - tank.rotation.y;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    tank.rotation.y += diff * 0.2;
                }

                if (data.health !== undefined) {
                    tank.userData.health = data.health;
                }
            }
        }

        // ============================================================
        // ❤️ تحديث صحة الدبابة
        // ============================================================
        function updateTankHealth(userId, health) {
            const tank = otherTanks.get(userId);
            if (tank) {
                tank.userData.health = health;
                if (health <= 0) {
                    removeTank(userId);
                }
            }
        }

        // ============================================================
        // 🗑️ إزالة دبابة
        // ============================================================
        function removeTank(userId) {
            const tank = otherTanks.get(userId);
            if (tank) {
                createExplosion(tank.position, 2.0);
                scene.remove(tank);
                otherTanks.delete(userId);
                updateTeamCounts();
            }
        }

        // ============================================================
        // 📊 تحديث أعداد الفرق
        // ============================================================
        function updateTeamCounts() {
            let team1 = 0,
                team2 = 0;

            // دبابة اللاعب
            if (playerTank && gameState.isAlive) {
                if (gameState.team === 1) team1++;
                else team2++;
            }

            // الدبابات الأخرى
            for (const [id, tank] of otherTanks) {
                if (tank.userData.health > 0) {
                    if (tank.userData.team === 1) team1++;
                    else team2++;
                }
            }

            document.getElementById('myTeamCount').textContent = team1;
            document.getElementById('enemyTeamCount').textContent = team2;
        }

        // ============================================================
        // 💀 رسالة الإقصاء
        // ============================================================
        function showEliminationMessage(message, killerName) {
            const el = document.createElement('div');
            el.className = 'elimination-message';
            el.innerHTML = `
                ${message}
                <div class="sub">${killerName ? 'بواسطة: ' + killerName : ''}</div>
            `;
            document.body.appendChild(el);

            setTimeout(() => {
                el.remove();
            }, 3500);
        }

        // ============================================================
        // 📊 شاشة التقرير
        // ============================================================
        function showReport(data) {
            const screen = document.getElementById('reportScreen');
            const icon = document.getElementById('reportIcon');
            const title = document.getElementById('reportTitle');
            const subtitle = document.getElementById('reportSubtitle');
            const team = document.getElementById('reportTeam');
            const reward = document.getElementById('reportReward');
            const kills = document.getElementById('reportKills');
            const deaths = document.getElementById('reportDeaths');

            const isWinner = data.isWinner || false;
            const rewardAmount = data.reward || 0;

            icon.textContent = isWinner ? '🏆' : '💀';
            title.textContent = isWinner ? '🎉 انتصار!' : '💀 هزيمة!';
            subtitle.textContent = isWinner ? 'أحسنت! انتصرت في المعركة' : 'حظاً أوفر في المرة القادمة';

            team.textContent = data.yourTeam || 'الفريق الأول';
            team.style.color = isWinner ? '#2ecc71' : '#e74c3c';

            reward.textContent = rewardAmount > 0 ? `+${rewardAmount}$` : '0$';
            kills.textContent = data.kills || gameState.kills || 0;
            deaths.textContent = data.deaths || gameState.deaths || 0;

            screen.style.display = 'flex';

            // زر العودة
            document.getElementById('reportBtn').onclick = () => {
                screen.style.display = 'none';
                socket.emit('game_cleanup', {});
                window.location.reload();
            };

            // تحديث الرصيد
            if (data.yourBalance) {
                gameState.balance = data.yourBalance;
                document.getElementById('gameBalance').textContent = data.yourBalance + '$';
            }
        }

        // ============================================================
        // 📐 تغيير حجم النافذة
        // ============================================================
        function onResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            if (camera) {
                camera.aspect = width / height;
                camera.updateProjectionMatrix();
            }

            if (renderer) {
                renderer.setSize(width, height);
            }

            if (composer) {
                composer.setSize(width, height);
            }
        }

        // ============================================================
        // 🔄 حلقة اللعبة (Animation Loop)
        // ============================================================
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            // ============================================================
            // تحديث الرصاصات
            // ============================================================
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.position.add(b.userData.velocity.clone().multiplyScalar(delta * 60));

                // تأثير توهج الرصاصة
                if (b.children.length > 0 && b.children[0] instanceof THREE.PointLight) {
                    b.children[0].intensity = 0.5 + Math.random() * 0.5;
                }

                b.userData.life -= delta * 60;

                // التحقق من التصادم مع المباني
                let hit = false;
                for (const building of buildings) {
                    const bbox = new THREE.Box3().setFromObject(building);
                    const bboxB = new THREE.Box3().setFromObject(b);
                    if (bbox.intersectsBox(bboxB)) {
                        hit = true;
                        createExplosion(b.position);
                        scene.remove(b);
                        bullets.splice(i, 1);
                        break;
                    }
                }

                if (!hit && (b.userData.life < 0 || Math.abs(b.position.x) > 400 || Math.abs(b.position.z) > 400)) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }

                // التحقق من التصادم مع الدبابات الأخرى (للرصاصات المحلية)
                if (!hit && !b.userData.isRemote && b.userData.ownerId === TELEGRAM_ID) {
                    for (const [id, tank] of otherTanks) {
                        if (tank.userData.health > 0) {
                            const dist = b.position.distanceTo(tank.position);
                            if (dist < 2.5) {
                                hit = true;
                                createExplosion(b.position);
                                scene.remove(b);
                                bullets.splice(i, 1);

                                // إرسال حدث الضرر
                                socket.emit('damage', {
                                    targetId: id,
                                    damage: 100,
                                    position: {
                                        x: b.position.x,
                                        y: b.position.y,
                                        z: b.position.z,
                                    },
                                });
                                break;
                            }
                        }
                    }
                }
            }

            // ============================================================
            // تحديث الجسيمات
            // ============================================================
            updateParticles();

            // ============================================================
            // تحديث الكاميرا
            // ============================================================
            if (gameState.gameActive && !gameState.isEliminated) {
                updateCamera();
            }

            // ============================================================
            // تحديث حركة الدبابات الأخرى (تنعيم)
            // ============================================================
            for (const [id, tank] of otherTanks) {
                if (tank.userData.targetPosition) {
                    tank.position.x += (tank.userData.targetPosition.x - tank.position.x) * 0.15;
                    tank.position.z += (tank.userData.targetPosition.z - tank.position.z) * 0.15;
                }
                if (tank.userData.targetRotation !== undefined) {
                    let diff = tank.userData.targetRotation - tank.rotation.y;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    tank.rotation.y += diff * 0.15;
                }
            }

            // ============================================================
            // تحديث عجلات الدبابات (تأثير دوران)
            // ============================================================
            if (playerTank) {
                const speed = Math.abs(joystick.y) * 0.15;
                playerTank.children.forEach(child => {
                    if (child.geometry && child.geometry.type === 'CylinderGeometry' && child.position.z !== 0) {
                        child.rotation.x += speed;
                    }
                });
            }

            // ============================================================
            // تقديم المشهد
            // ============================================================
            if (composer) {
                composer.render();
            } else if (renderer) {
                renderer.render(scene, camera);
            }
        }

        // ============================================================
        // 🛑 التعامل مع الانقطاع
        // ============================================================
        socket.on('disconnect', () => {
            console.warn('⚠️ Disconnected from server. Reconnecting...');
        });

        socket.on('reconnect', () => {
            console.log('🔄 Reconnected to server');
            // إعادة المصادقة
            if (gameState.token) {
                socket.emit('auth', { telegramId: TELEGRAM_ID, token: gameState.token });
            }
        });

        // ============================================================
        // 🚀 تهيئة
        // ============================================================
        console.log('🎮 Battle Tanks Elite v6.0 - Game Engine Initialized');
        console.log(`👤 Player: ${USERNAME} (${TELEGRAM_ID})`);
        console.log('📡 Waiting for server connection...');

        // إظهار شاشة التحميل
        document.getElementById('loading').style.display = 'flex';
        document.getElementById('loadProgress').style.width = '30%';

        // محاكاة تقدم التحميل
        let progress = 30;
        const loadInterval = setInterval(() => {
            progress += Math.random() * 5;
            if (progress > 90) {
                clearInterval(loadInterval);
                document.getElementById('loadProgress').style.width = '100%';
                setTimeout(() => {
                    if (!gameState.gameActive) {
                        document.getElementById('loading').style.display = 'none';
                    }
                }, 500);
            } else {
                document.getElementById('loadProgress').style.width = progress + '%';
            }
        }, 200);
    </script>

</body>
